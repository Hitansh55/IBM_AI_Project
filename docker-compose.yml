version: '3.8'

services:
  ai-study-buddy:
    build: .
    container_name: ai-study-buddy
    restart: always
    ports:
      - "80:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
